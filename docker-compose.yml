# Full stack: postgres + pgbouncer (transaction pooling) + redis + web + worker
# + beat + telegram bot. Mirrors the reference project's DB pattern
# (PgBouncer transaction mode, matched by CONN_MAX_AGE=0 /
# DISABLE_SERVER_SIDE_CURSORS in settings).
x-app: &app
  build: .
  env_file: .env
  environment: &app-env
    DATABASE_URL: postgres://upwork:upwork@pgbouncer:6432/upwork
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/1
  depends_on: [pgbouncer, redis]

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: upwork
      POSTGRES_PASSWORD: upwork
      POSTGRES_DB: upwork
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgres://upwork:upwork@db:5432/upwork
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "20"
      LISTEN_PORT: "6432"
    depends_on: [db]

  redis:
    image: redis:7

  web:
    <<: *app
    command: sh -c "python manage.py migrate && gunicorn config.wsgi -b 0.0.0.0:8000 -w 3"
    ports:
      - "8000:8000"

  worker:
    <<: *app
    command: celery -A config worker -l info

  beat:
    <<: *app
    command: celery -A config beat -l info

  bot:
    <<: *app
    command: python manage.py run_bot  # no-op until TELEGRAM_BOT_TOKEN is set

volumes:
  pgdata:
